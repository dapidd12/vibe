<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeCode Studio Pro</title>
    
    <!-- Memuat Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Memuat React & Babel untuk menjalankan JSX di Browser -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Custom CSS untuk Scrollbar & Base -->
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
        body { margin: 0; background-color: #050505; color: #e5e5e5; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body>
    <!-- Wadah Aplikasi React -->
    <div id="root"></div>

    <!-- Skrip Aplikasi Utama (Tipe Babel agar mendukung JSX dan Import Module) -->
    <script type="text/babel" data-type="module">
        // --- KONFIGURASI GLOBAL ---
        // MASUKKAN API KEY DEFAULT DI SINI agar web bisa langsung dipakai oleh pengguna tanpa login/setup.
        const GLOBAL_API_KEY = "AIzaSyAc0C1kxdbgFWNNU09uQ3jkjPs5eT2njfc"; 

        const { useState, useEffect } = React;
        
        // Mengimpor Ikon Lucide dari CDN ESM
        import { 
            Sparkles, Code2, Play, Copy, Check, TerminalSquare, Loader2, 
            LayoutTemplate, AlertCircle, BrainCircuit, Zap, Settings, KeyRound, 
            Cpu, X, Download, Send, Wand2, FileCode2, FileJson, FileText, 
            Archive, FolderOpen, Undo2, Smartphone, Tablet, Monitor, 
            Instagram, MessageCircle, Music, Rocket, Info, ShieldCheck
        } from 'https://esm.sh/lucide-react@0.292.0';

        function App() {
            // --- STATE MANAGEMENT ---
            const [activeTab, setActiveTab] = useState("generator");
            const [showWelcome, setShowWelcome] = useState(true);

            // Settings State (dengan persistensi Local Storage)
            const [showSettings, setShowSettings] = useState(false);
            const [useCustomKey, setUseCustomKey] = useState(() => localStorage.getItem('vibe_useCustomKey') === 'true');
            const [apiKeyInput, setApiKeyInput] = useState(() => localStorage.getItem('vibe_apiKey') || "");
            const [selectedModel, setSelectedModel] = useState(() => localStorage.getItem('vibe_model') || "gemini-2.5-flash");

            // Menyimpan pengaturan ke Local Storage saat berubah
            useEffect(() => {
                localStorage.setItem('vibe_useCustomKey', useCustomKey);
                localStorage.setItem('vibe_apiKey', apiKeyInput);
                localStorage.setItem('vibe_model', selectedModel);
            }, [useCustomKey, apiKeyInput, selectedModel]);

            // Generator State
            const [idea, setIdea] = useState("");
            const [generatedPrompt, setGeneratedPrompt] = useState("");
            const [isGeneratingPrompt, setIsGeneratingPrompt] = useState(false);
            const [copiedPrompt, setCopiedPrompt] = useState(false);

            // Executor & Refine State
            const [generatedFiles, setGeneratedFiles] = useState(null);
            const [history, setHistory] = useState([]); 
            const [activeFile, setActiveFile] = useState("index.html");
            const [isExecuting, setIsExecuting] = useState(false);
            const [isRefining, setIsRefining] = useState(false);
            const [refinePrompt, setRefinePrompt] = useState("");
            const [viewMode, setViewMode] = useState("preview"); 
            const [previewDevice, setPreviewDevice] = useState("desktop");
            const [copiedCode, setCopiedCode] = useState(false);
            const [isDownloading, setIsDownloading] = useState(false);
            const [error, setError] = useState("");

            // --- HELPER: LOAD JSZIP DYNAMICALLY ---
            const loadJSZip = async () => {
                if (window.JSZip) return window.JSZip;
                return new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
                    script.onload = () => resolve(window.JSZip);
                    script.onerror = () => reject(new Error("Gagal memuat JSZip."));
                    document.head.appendChild(script);
                });
            };

            // --- API HELPER ---
            const callGeminiAPI = async (prompt, systemInstruction, requireJson = false) => {
                // Prioritaskan Custom Key jika diaktifkan, jika tidak gunakan Global Key
                let finalApiKey = "";
                if (useCustomKey && apiKeyInput.trim() !== "") {
                    finalApiKey = apiKeyInput.trim();
                } else {
                    finalApiKey = GLOBAL_API_KEY.trim();
                }

                if(!finalApiKey) {
                    throw new Error(useCustomKey 
                        ? "API Key Pribadi Anda kosong." 
                        : "API Key Global belum dikonfigurasi oleh pemilik web. Silakan gunakan API Key Pribadi Anda di menu Pengaturan.");
                }

                const url = `https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${finalApiKey}`;
                const maxRetries = 5;
                const baseDelay = 1000;

                for (let attempt = 0; attempt < maxRetries; attempt++) {
                    try {
                        const payload = {
                            systemInstruction: { parts: [{ text: systemInstruction }] },
                            contents: [{ role: "user", parts: [{ text: prompt }] }],
                            generationConfig: {
                                temperature: requireJson ? 0.1 : 0.6,
                                ...(requireJson && { responseMimeType: "application/json" })
                            }
                        };

                        const response = await fetch(url, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload),
                        });

                        if (!response.ok) {
                            const errData = await response.json();
                            throw new Error(errData.error?.message || `HTTP Error ${response.status}`);
                        }

                        const data = await response.json();
                        const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                        
                        if (!text) throw new Error("Respons API kosong.");
                        return text;
                    } catch (err) {
                        if (attempt === maxRetries - 1) throw err; 
                        await new Promise(resolve => setTimeout(resolve, baseDelay * Math.pow(2, attempt)));
                    }
                }
            };

            // --- HANDLERS ---
            const handleGeneratePrompt = async () => {
                if (!idea.trim()) { setError("Silakan masukkan ide aplikasi Anda."); return; }
                setError(""); setIsGeneratingPrompt(true);
                
                const systemInstruction = `Anda adalah "Principal Software Architect" dan "Lead UX Engineer" kelas dunia.
Tugas Anda: Mengubah ide kasar menjadi "Vibe Coding Prompt" yang SANGAT TAJAM, komprehensif, dan siap produksi.

STRUKTUR OUTPUT WAJIB:
1. **VISI & VIBE PRODUK**: Jelaskan konsep dan nuansa visual secara mendalam. Tentukan Palet Warna spesifik (Tailwind classes).
2. **ARSITEKTUR MULTI-FILE & TECH STACK**: Wajibkan format: index.html, style.css, script.js, README.md. Wajibkan \`<meta name="viewport" content="width=device-width, initial-scale=1.0">\` di HTML. Wajibkan Tailwind CSS (CDN).
3. **LOGIKA & STATE MANAGEMENT (JS)**: Instruksikan struktur Vanilla JS yang modular.
4. **RESPONSIVITAS & A11Y**: Tuntut pendekatan Mobile-First.
5. **EDGE CASES**: Instruksikan pembuatan UI State: Empty, Loading, Error.

Hasilkan instruksi tegas dan jelas dalam bahasa Indonesia. Jangan menulis kode aplikasi, cukup buat prompt instruksinya.`;

                try {
                    const result = await callGeminiAPI(idea, systemInstruction);
                    setGeneratedPrompt(result);
                    if(window.innerWidth < 1024) setActiveTab("generator"); 
                } catch (err) {
                    setError(`Gagal membuat arsitektur: ${err.message}`);
                    if(err.message.includes("API Key")) setShowSettings(true);
                } finally {
                    setIsGeneratingPrompt(false);
                }
            };

            const handleExecutePrompt = async () => {
                if (!generatedPrompt.trim()) { setError("Prompt kosong. Generate prompt terlebih dahulu."); return; }
                setError(""); setIsExecuting(true); setActiveTab("executor"); setViewMode("preview");
                
                const systemInstruction = `Anda adalah "Elite Full-Stack AI Developer".
Tugas Anda: Menulis kode sumber lengkap, sempurna, dan siap pakai berdasarkan instruksi.

ATURAN MUTLAK:
1. Output HARUS BERUPA JSON MURNI yang mewakili struktur direktori proyek.
Format:
{
  "index.html": "<!DOCTYPE html>\\n<html lang='id'>\\n<head>\\n<meta charset='UTF-8'>\\n<meta name='viewport' content='width=device-width, initial-scale=1.0'>\\n<title>App</title>\\n<link rel='stylesheet' href='style.css'>\\n</head>\\n<body>\\n<!-- UI disini -->\\n<script src='script.js'><\\/script>\\n</body>\\n</html>",
  "style.css": "/* Custom CSS */",
  "script.js": "/* Logika JS */",
  "README.md": "# Dokumentasi Proyek\\n..."
}
2. WAJIB menggunakan Tailwind CSS (via CDN) di index.html.
3. Desain HARUS responsif (gunakan class sm:, md:, lg:).
4. Sediakan data dummy bawaan agar aplikasi tidak kosong.`;

                try {
                    const result = await callGeminiAPI(generatedPrompt, systemInstruction, true);
                    const files = processJSONResponse(result);
                    setHistory([]); 
                    setGeneratedFiles(files);
                    setActiveFile('index.html');
                    setPreviewDevice('desktop'); 
                } catch (err) {
                    setError(`Gagal membangun proyek: ${err.message}`);
                } finally {
                    setIsExecuting(false);
                }
            };

            const handleRefineCode = async () => {
                if (!refinePrompt.trim() || !generatedFiles) return;
                setError(""); setIsRefining(true);
                
                const systemInstruction = `Anda adalah "Senior Code Reviewer & Refactoring Expert".
Tugas Anda: MEREVISI kode sumber proyek web JSON berdasarkan permintaan pengguna.

ATURAN:
1. Output HARUS BERUPA JSON MURNI struktur proyek: {"index.html": "...", "style.css": "...", "script.js": "...", "README.md": "..."}
2. JANGAN HAPUS fitur yang ada kecuali diminta. Integrasikan perubahan dengan mulus.`;

                const promptPayload = `PROYEK SAAT INI (JSON):\n${JSON.stringify(generatedFiles)}\n\nPERINTAH REVISI:\n${refinePrompt}`;

                try {
                    const result = await callGeminiAPI(promptPayload, systemInstruction, true);
                    const newFiles = processJSONResponse(result);
                    setHistory(prev => [...prev, generatedFiles]);
                    setGeneratedFiles(newFiles);
                    setRefinePrompt("");
                } catch (err) {
                    setError(`Gagal merevisi kode: ${err.message}`);
                } finally {
                    setIsRefining(false);
                }
            };

            const handleUndo = () => {
                if (history.length === 0) return;
                const previousFiles = history[history.length - 1];
                const newHistory = history.slice(0, -1);
                setGeneratedFiles(previousFiles);
                setHistory(newHistory);
            };

            const processJSONResponse = (rawResponse) => {
                try {
                    let cleaned = rawResponse.replace(/^```(json)?\s*/i, '').replace(/\s*```$/i, '').trim();
                    const files = JSON.parse(cleaned);
                    if (!files['index.html']) throw new Error("File index.html tidak ditemukan.");
                    if (!files['style.css']) files['style.css'] = "";
                    if (!files['script.js']) files['script.js'] = "";
                    if (!files['README.md']) files['README.md'] = "# Vibe Project";
                    return files;
                } catch (err) {
                    throw new Error("Gagal mengurai respons AI. Format tidak sesuai (bukan JSON murni).");
                }
            };

            // --- SMART DOM INJECTION ---
            const getPreviewHTML = () => {
                if (!generatedFiles || !generatedFiles['index.html']) return "";
                let htmlContent = generatedFiles['index.html'];
                const cssContent = generatedFiles['style.css'] || "";
                const jsContent = generatedFiles['script.js'] || "";

                try {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlContent, 'text/html');

                    if (!doc.querySelector('meta[name="viewport"]')) {
                        const meta = doc.createElement('meta');
                        meta.name = "viewport";
                        meta.content = "width=device-width, initial-scale=1.0";
                        doc.head.prepend(meta);
                    }

                    const links = doc.querySelectorAll('link[rel="stylesheet"]');
                    links.forEach(link => {
                        const href = link.getAttribute('href');
                        if (href && (href.includes('style.css') || href === './style.css')) link.remove();
                    });
                    const scripts = doc.querySelectorAll('script');
                    scripts.forEach(script => {
                        const src = script.getAttribute('src');
                        if (src && (src.includes('script.js') || src === './script.js')) script.remove();
                    });

                    if (cssContent.trim() !== "") {
                        const styleElement = doc.createElement('style');
                        styleElement.textContent = cssContent;
                        doc.head.appendChild(styleElement);
                    }

                    if (jsContent.trim() !== "") {
                        const scriptElement = doc.createElement('script');
                        scriptElement.textContent = `
                            document.addEventListener("DOMContentLoaded", () => {
                                try { ${jsContent} } catch(e) { console.error("VibeCode Error:", e); }
                            });
                        `;
                        doc.body.appendChild(scriptElement);
                    }

                    return "<!DOCTYPE html>\n" + doc.documentElement.outerHTML;
                } catch (e) {
                    console.error("DOM Injection Failed:", e);
                    return htmlContent; 
                }
            };

            const handleDownloadZip = async () => {
                if (!generatedFiles) return;
                setIsDownloading(true);
                try {
                    const JSZip = await loadJSZip();
                    const zip = new JSZip();

                    Object.entries(generatedFiles).forEach(([filename, content]) => {
                        zip.file(filename, content);
                    });

                    const promptContent = `# Vibe Coding Prompt\n\n## Ide\n${idea}\n\n## Prompt\n${generatedPrompt}\n`;
                    zip.file('vibe-prompt.md', promptContent);

                    const blob = await zip.generateAsync({ type: "blob" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'VibeApp-Project.zip';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                } catch (err) {
                    setError("Gagal membuat file ZIP.");
                } finally {
                    setIsDownloading(false);
                }
            };

            const copyToClipboard = (text, type) => {
                try {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);

                    if (type === 'prompt') {
                        setCopiedPrompt(true);
                        setTimeout(() => setCopiedPrompt(false), 2000);
                    } else {
                        setCopiedCode(true);
                        setTimeout(() => setCopiedCode(false), 2000);
                    }
                } catch (err) {
                    setError("Gagal menyalin teks.");
                }
            };

            const getFileIcon = (filename) => {
                if (filename.endsWith('.html')) return <FileCode2 className="w-4 h-4 text-orange-400" />;
                if (filename.endsWith('.css')) return <FileCode2 className="w-4 h-4 text-blue-400" />;
                if (filename.endsWith('.js')) return <FileJson className="w-4 h-4 text-yellow-400" />;
                return <FileText className="w-4 h-4 text-neutral-400" />;
            };

            return (
                <div className="min-h-screen bg-[#050505] text-neutral-200 font-sans selection:bg-indigo-500/30 overflow-hidden flex flex-col">
                
                {/* WELCOME / CREDIT MODAL */}
                {showWelcome && (
                    <div className="fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center z-[200] px-4">
                    <div className="bg-[#0a0a0a] border border-white/10 rounded-3xl w-full max-w-lg shadow-[0_0_50px_rgba(99,102,241,0.15)] overflow-hidden relative flex flex-col max-h-[90vh]">
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full h-32 bg-indigo-500/20 blur-[50px] pointer-events-none"></div>

                        <div className="p-6 sm:p-8 overflow-y-auto custom-scrollbar relative z-10 flex-1">
                        <div className="flex justify-center mb-6">
                            <div className="bg-gradient-to-br from-indigo-500/20 to-purple-500/20 p-4 rounded-2xl border border-indigo-500/30 shadow-[0_0_20px_rgba(99,102,241,0.2)]">
                                <Rocket className="w-10 h-10 text-indigo-400" />
                            </div>
                        </div>

                        <h2 className="text-2xl sm:text-3xl font-bold text-center bg-gradient-to-r from-white via-indigo-100 to-indigo-300 bg-clip-text text-transparent mb-3">
                            Selamat Datang di VibeCode
                        </h2>
                        <p className="text-center text-sm text-neutral-400 mb-8 leading-relaxed">
                            Platform *AI Web Builder* canggih yang merubah ide abstrak Anda menjadi kode aplikasi web produksi lengkap hanya dalam hitungan detik.
                        </p>

                        <div className="bg-white/5 border border-white/5 rounded-2xl p-5 mb-8">
                            <h3 className="text-sm font-bold text-white mb-3 flex items-center gap-2">
                            <Info className="w-4 h-4 text-indigo-400" /> Cara Penggunaan:
                            </h3>
                            <ul className="space-y-3 text-sm text-neutral-300">
                            <li className="flex items-start gap-3">
                                <span className="bg-indigo-500/20 text-indigo-300 w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold shrink-0 mt-0.5">1</span>
                                <p>Tuliskan ide aplikasi Anda di panel <b>Ide Aplikasi</b>.</p>
                            </li>
                            <li className="flex items-start gap-3">
                                <span className="bg-indigo-500/20 text-indigo-300 w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold shrink-0 mt-0.5">2</span>
                                <p>Klik <b>Generate Prompt Ultra</b> untuk merumuskan arsitektur sistem.</p>
                            </li>
                            <li className="flex items-start gap-3">
                                <span className="bg-indigo-500/20 text-indigo-300 w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold shrink-0 mt-0.5">3</span>
                                <p>Klik <b>Eksekusi Multi-File</b> dan biarkan AI membangun UI, CSS & JS untuk Anda!</p>
                            </li>
                            </ul>
                        </div>

                        <div className="text-center">
                            <p className="text-xs font-mono text-neutral-500 uppercase tracking-widest mb-4">Developed By</p>
                            <div className="inline-block bg-gradient-to-r from-indigo-500 to-purple-500 p-[1px] rounded-xl mb-4">
                            <div className="bg-[#0a0a0a] px-6 py-2 rounded-xl">
                                <span className="font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">
                                KaiDev (dapid)
                                </span>
                            </div>
                            </div>

                            <div className="flex flex-wrap justify-center gap-2 sm:gap-3">
                            <a href="https://instagram.com/dapid_ae02" target="_blank" rel="noreferrer" className="flex items-center gap-2 px-4 py-2 bg-white/5 hover:bg-pink-500/20 hover:text-pink-400 border border-white/5 hover:border-pink-500/30 rounded-xl transition-all text-xs font-medium text-neutral-300">
                                <Instagram className="w-4 h-4" /> IG
                            </a>
                            <a href="https://tiktok.com/@dapid_ae02" target="_blank" rel="noreferrer" className="flex items-center gap-2 px-4 py-2 bg-white/5 hover:bg-black hover:text-white border border-white/5 hover:border-white/30 rounded-xl transition-all text-xs font-medium text-neutral-300">
                                <Music className="w-4 h-4" /> TikTok
                            </a>
                            <a href="https://t.me/dapidd_ae02" target="_blank" rel="noreferrer" className="flex items-center gap-2 px-4 py-2 bg-white/5 hover:bg-blue-500/20 hover:text-blue-400 border border-white/5 hover:border-blue-500/30 rounded-xl transition-all text-xs font-medium text-neutral-300">
                                <Send className="w-4 h-4" /> Telegram
                            </a>
                            <a href="https://wa.me/6282138305820" target="_blank" rel="noreferrer" className="flex items-center gap-2 px-4 py-2 bg-white/5 hover:bg-emerald-500/20 hover:text-emerald-400 border border-white/5 hover:border-emerald-500/30 rounded-xl transition-all text-xs font-medium text-neutral-300">
                                <MessageCircle className="w-4 h-4" /> WhatsApp
                            </a>
                            </div>
                        </div>

                        </div>

                        <div className="p-4 sm:p-5 border-t border-white/10 bg-black/20 backdrop-blur-xl relative z-20">
                        <button 
                            onClick={() => setShowWelcome(false)} 
                            className="w-full bg-white text-black hover:bg-neutral-200 py-3.5 rounded-xl text-sm font-bold transition-all shadow-[0_0_20px_rgba(255,255,255,0.1)] active:scale-[0.98]"
                        >
                            Mulai Berkarya Sekarang
                        </button>
                        </div>

                    </div>
                    </div>
                )}

                {/* MODAL SETTINGS */}
                {showSettings && (
                    <div className="fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center z-[100] px-4">
                    <div className="bg-[#0a0a0a] border border-white/10 rounded-3xl w-full max-w-md shadow-2xl overflow-hidden">
                        <div className="p-5 border-b border-white/5 flex items-center justify-between">
                        <h3 className="font-semibold text-white flex items-center gap-2">
                            <Settings className="w-5 h-5 text-indigo-400" /> Pengaturan Sistem
                        </h3>
                        <button onClick={() => setShowSettings(false)} className="text-neutral-500 hover:text-white transition-colors bg-white/5 hover:bg-white/10 p-1.5 rounded-full">
                            <X className="w-5 h-5" />
                        </button>
                        </div>
                        
                        <div className="p-6 space-y-6">
                        <div className="space-y-4">
                            <div className="flex items-center justify-between bg-white/5 p-4 rounded-xl border border-white/10">
                                <div>
                                    <label className="text-sm font-medium text-white flex items-center gap-2">
                                        <KeyRound className="w-4 h-4 text-indigo-400" /> Gunakan API Key Pribadi
                                    </label>
                                    <p className="text-xs text-neutral-400 mt-1">Aktifkan untuk memakai kunci milik Anda sendiri.</p>
                                </div>
                                <button 
                                    onClick={() => setUseCustomKey(!useCustomKey)}
                                    className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors ${useCustomKey ? 'bg-indigo-500' : 'bg-neutral-700'}`}
                                >
                                    <span className={`inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${useCustomKey ? 'translate-x-6' : 'translate-x-1'}`} />
                                </button>
                            </div>

                            {useCustomKey ? (
                                <div className="animate-in fade-in slide-in-from-top-2">
                                    <label className="text-xs font-semibold text-neutral-400 uppercase tracking-wider mb-2 block">Masukkan API Key Anda</label>
                                    <input
                                        type="password"
                                        value={apiKeyInput}
                                        onChange={(e) => setApiKeyInput(e.target.value)}
                                        placeholder="AIzaSy..."
                                        className="w-full bg-[#050505] border border-white/10 rounded-xl px-4 py-3 text-sm text-neutral-200 focus:outline-none focus:border-indigo-500 transition-all shadow-inner"
                                    />
                                    <p className="text-[11px] text-neutral-500 mt-2">*Tersimpan aman di browser Anda (Local Storage).</p>
                                </div>
                            ) : (
                                <div className="animate-in fade-in slide-in-from-top-2 text-sm text-emerald-400/90 bg-emerald-500/10 p-4 rounded-xl border border-emerald-500/20 leading-relaxed flex gap-3 items-start">
                                    <ShieldCheck className="w-5 h-5 shrink-0 text-emerald-500 mt-0.5" />
                                    <div>
                                        <b>Global Key Aktif:</b>
                                        <p className="text-emerald-500/70 text-xs mt-1">Sistem menggunakan API Key bawaan secara default. Anda bisa langsung memakainya secara gratis.</p>
                                    </div>
                                </div>
                            )}
                        </div>

                    <div className="bg-[#0a0a0a] border border-white/5 rounded-3xl overflow-hidden shadow-2xl flex flex-col flex-1 min-h-[300px] relative">
                        {generatedPrompt && <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 opacity-80"></div>}
                        
                        <div className="p-4 border-b border-white/5 flex items-center justify-between bg-white/[0.02]">
                        <div className="flex items-center gap-3">
                            <div className="bg-white/10 text-neutral-200 w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold shadow-inner">2</div>
                            <h2 className="font-semibold text-neutral-100 text-sm">Instruksi Sistem</h2>
                        </div>
                        {generatedPrompt && (
                            <button onClick={() => copyToClipboard(generatedPrompt, 'prompt')} className="text-neutral-400 hover:text-white p-1.5 rounded-lg bg-white/5 hover:bg-white/10 transition-colors" title="Salin Prompt">
                            {copiedPrompt ? <Check className="w-4 h-4 text-green-400" /> : <Copy className="w-4 h-4" />}
                            </button>
                        )}
                        </div>
                        <div className="p-5 flex-1 flex flex-col gap-4">
                        <textarea
                            value={generatedPrompt}
                            onChange={(e) => setGeneratedPrompt(e.target.value)}
                            placeholder="Prompt berspesifikasi tinggi akan dirender di sini..."
                            className="flex-1 w-full bg-transparent resize-none text-indigo-200/90 font-mono text-[13px] leading-relaxed focus:outline-none custom-scrollbar"
                        />
                        <button
                            onClick={handleExecutePrompt}
                            disabled={isExecuting || !generatedPrompt.trim()}
                            className="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 disabled:from-neutral-800 disabled:to-neutral-800 disabled:text-neutral-500 text-white py-3.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-all shadow-[0_0_20px_rgba(99,102,241,0.3)] active:scale-[0.98]"
                        >
                            {isExecuting ? <><Loader2 className="w-4 h-4 animate-spin" /> Menulis Kode...</> : <><Code2 className="w-4 h-4" /> Render Multi-File Project</>}
                        </button>
                        </div>
                    </div>
                    </div>

                    {/* RIGHT PANEL */}
                    <div className={`flex-1 flex-col ${activeTab === 'generator' ? 'hidden lg:flex' : 'flex'} min-w-0 h-full`}>
                    <div className="bg-[#080808] border border-white/10 rounded-3xl overflow-hidden shadow-2xl flex flex-col h-full relative ring-1 ring-white/5">
                        
                        <div className="p-3 sm:p-4 border-b border-white/5 bg-[#080808] flex flex-wrap items-center justify-between z-20 gap-3">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-500/10 text-indigo-400 w-7 h-7 sm:w-8 sm:h-8 rounded-full flex items-center justify-center text-xs sm:text-sm font-bold border border-indigo-500/20 shadow-inner shrink-0">3</div>
                            <h2 className="font-semibold text-neutral-100 flex items-center gap-2 text-sm sm:text-base whitespace-nowrap">
                            Live Workspace
                            {(isExecuting || isRefining) && <span className="flex h-2 w-2 rounded-full bg-indigo-500 animate-pulse ml-1 shadow-[0_0_10px_rgba(99,102,241,0.8)]"></span>}
                            </h2>
                        </div>

                        {generatedFiles && (
                            <div className="flex items-center gap-1.5 bg-[#0a0a0a] border border-white/5 rounded-xl p-1.5 shadow-inner overflow-x-auto custom-scrollbar flex-nowrap w-full sm:w-auto">
                            <button onClick={() => setViewMode("preview")} className={`px-3 sm:px-4 py-1.5 text-xs font-bold rounded-lg transition-all flex items-center gap-2 whitespace-nowrap ${viewMode === "preview" ? "bg-indigo-600/20 text-indigo-400 border border-indigo-500/20" : "text-neutral-500 hover:text-neutral-300"}`}>
                                <Play className="w-3.5 h-3.5" /> <span className="hidden sm:inline">Preview</span>
                            </button>
                            <button onClick={() => setViewMode("code")} className={`px-3 sm:px-4 py-1.5 text-xs font-bold rounded-lg transition-all flex items-center gap-2 whitespace-nowrap ${viewMode === "code" ? "bg-white/10 text-white border border-white/10" : "text-neutral-500 hover:text-neutral-300"}`}>
                                <Code2 className="w-3.5 h-3.5" /> <span className="hidden sm:inline">Files</span>
                            </button>
                            
                            {viewMode === "preview" && (
                                <div className="flex items-center border-l border-white/10 ml-1 pl-1.5 gap-1">
                                <button onClick={() => setPreviewDevice("mobile")} className={`p-1.5 rounded-lg transition-colors ${previewDevice === 'mobile' ? 'bg-white/10 text-white' : 'text-neutral-500 hover:text-neutral-300'}`} title="Mobile View"><Smartphone className="w-4 h-4" /></button>
                                <button onClick={() => setPreviewDevice("tablet")} className={`p-1.5 rounded-lg transition-colors hidden sm:block ${previewDevice === 'tablet' ? 'bg-white/10 text-white' : 'text-neutral-500 hover:text-neutral-300'}`} title="Tablet View"><Tablet className="w-4 h-4" /></button>
                                <button onClick={() => setPreviewDevice("desktop")} className={`p-1.5 rounded-lg transition-colors hidden sm:block ${previewDevice === 'desktop' ? 'bg-white/10 text-white' : 'text-neutral-500 hover:text-neutral-300'}`} title="Desktop View"><Monitor className="w-4 h-4" /></button>
                                </div>
                            )}

                            <div className="pl-1.5 border-l border-white/10 ml-auto flex gap-1">
                                <button onClick={handleUndo} disabled={history.length === 0 || isExecuting || isRefining} title="Undo Revisi" className="p-1.5 text-neutral-400 hover:text-amber-400 bg-white/5 rounded-lg hover:bg-white/10 transition-all disabled:opacity-30">
                                <Undo2 className="w-3.5 h-3.5" />
                                </button>
                                <button onClick={handleDownloadZip} disabled={isDownloading} title="Download ZIP" className="px-3 py-1.5 text-neutral-400 hover:text-emerald-400 bg-white/5 rounded-lg hover:bg-white/10 transition-all flex items-center gap-1.5 disabled:opacity-50 whitespace-nowrap">
                                {isDownloading ? <Loader2 className="w-3.5 h-3.5 animate-spin" /> : <Archive className="w-3.5 h-3.5" />}
                                <span className="text-xs font-bold hidden md:block">ZIP</span>
                                </button>
                            </div>
                            </div>
                        )}
                        </div>

                        <div className="flex-1 relative bg-[#050505] flex overflow-hidden">
                        {(isExecuting || isRefining) ? (
                            <div className="absolute inset-0 flex flex-col items-center justify-center bg-[#050505]/95 backdrop-blur-md z-30 transition-all duration-500 px-4 text-center">
                            <div className="relative flex items-center justify-center mb-8 w-32 h-32 sm:w-40 sm:h-40">
                                <div className="absolute w-full h-full border-2 border-transparent border-t-indigo-500 border-l-purple-500 rounded-full animate-[spin_1.5s_linear_infinite] shadow-[0_0_30px_rgba(99,102,241,0.2)]"></div>
                                <div className="absolute w-24 h-24 sm:w-32 sm:h-32 border-2 border-transparent border-b-purple-500 border-r-pink-500 rounded-full animate-[spin_2s_linear_infinite_reverse]"></div>
                                <div className="absolute w-16 h-16 sm:w-24 sm:h-24 border border-indigo-500/30 rounded-full animate-ping"></div>
                                {isRefining ? <Wand2 className="w-8 h-8 sm:w-10 sm:h-10 text-indigo-300 animate-pulse relative z-10" /> : <Code2 className="w-8 h-8 sm:w-10 sm:h-10 text-indigo-300 animate-pulse relative z-10" />}
                            </div>
                            <h3 className="text-xl sm:text-2xl font-bold bg-gradient-to-r from-indigo-300 via-white to-purple-300 bg-clip-text text-transparent mb-2">
                                {isRefining ? "Merevisi Arsitektur..." : "Membangun Proyek..."}
                            </h3>
                            <p className="text-indigo-400/60 font-mono text-[10px] sm:text-xs tracking-[0.2em] uppercase">Generasi DOM & Logika JS</p>
                            </div>
                        ) : null}

                        {!generatedFiles && !isExecuting ? (
                            <div className="absolute inset-0 flex flex-col items-center justify-center text-neutral-500 p-6 sm:p-8 text-center bg-[#050505] z-10">
                            <div className="bg-white/[0.02] p-6 sm:p-8 rounded-[2rem] mb-6 shadow-inner border border-white/5">
                                <TerminalSquare className="w-16 h-16 sm:w-20 sm:h-20 opacity-20 text-indigo-500" />
                            </div>
                            <h3 className="text-xl sm:text-2xl font-bold text-neutral-300 mb-2">Workspace Siaga</h3>
                            <p className="text-xs sm:text-sm max-w-md text-neutral-500 leading-relaxed">
                                Tulis ide Anda, hasilkan prompt, lalu klik Render. Sistem akan menghasilkan UI responsif dan kode yang bersih.
                            </p>
                            </div>
                        ) : (
                            viewMode === "preview" ? (
                            <div className="w-full h-full bg-[#0a0a0a] flex justify-center items-start overflow-auto custom-scrollbar p-2 sm:p-4">
                                <div className={`transition-all duration-500 ease-in-out bg-white relative flex flex-col overflow-hidden shadow-2xl
                                    ${previewDevice === 'mobile' ? 'w-[375px] h-[812px] rounded-[2rem] border-[8px] border-neutral-800 my-auto shrink-0' : 
                                        previewDevice === 'tablet' ? 'w-[768px] h-[1024px] rounded-[1.5rem] border-[8px] border-neutral-800 my-auto shrink-0' : 
                                        'w-full h-full rounded-lg border border-neutral-800'}`
                                }>
                                    <div className={`w-full bg-[#f5f5f5] border-b border-neutral-200 flex items-center gap-2 z-10 shrink-0 ${previewDevice === 'desktop' ? 'h-10 px-4' : 'h-6 px-3 justify-center'}`}>
                                        {previewDevice === 'desktop' ? (
                                            <>
                                            <div className="w-3 h-3 rounded-full bg-[#ff5f56]"></div>
                                            <div className="w-3 h-3 rounded-full bg-[#ffbd2e]"></div>

                                            <div className="mx-auto bg-white px-8 md:px-20 py-1 rounded-md text-[11px] text-neutral-400 font-sans border border-neutral-200 shadow-sm flex items-center gap-2 truncate">
                                                <Sparkles className="w-3 h-3 shrink-0" /> vibecode.local
                                            </div>
                                            </>
                                        ) : (
                                            <div className="w-16 h-4 bg-neutral-200 rounded-full flex items-center justify-center">
                                                <div className="w-1.5 h-1.5 rounded-full bg-neutral-300 mr-1"></div>
                                                <div className="w-6 h-1 rounded-full bg-neutral-300"></div>
                                            </div>
                                        )}
                                    </div>
                                    <iframe title="Web App Preview" srcDoc={getPreviewHTML()} className="w-full flex-1 border-none bg-white" sandbox="allow-scripts allow-modals allow-forms allow-same-origin"/>
                                </div>
                            </div>
                            ) : (
                            <div className="w-full h-full flex flex-col md:flex-row bg-[#080808]">
                                <div className="w-full md:w-48 lg:w-56 border-b md:border-b-0 md:border-r border-white/5 bg-[#0a0a0a] flex flex-row md:flex-col shrink-0 overflow-x-auto md:overflow-x-hidden custom-scrollbar">
                                    <div className="p-3 md:p-4 border-r md:border-r-0 md:border-b border-white/5 shrink-0 hidden md:block">
                                        <span className="text-xs font-bold text-neutral-500 uppercase tracking-widest flex items-center gap-2">
                                            <FolderOpen className="w-4 h-4 text-indigo-400" /> Explorer
                                        </span>
                                    </div>
                                    <div className="flex flex-row md:flex-col flex-1 py-2 md:py-3 space-x-1 md:space-x-0 md:space-y-1 px-2">
                                        {Object.keys(generatedFiles).map((filename) => (
                                            <button key={filename} onClick={() => setActiveFile(filename)} className={`whitespace-nowrap md:whitespace-normal md:w-full text-left px-3 md:px-4 py-2 md:py-2.5 rounded-xl text-xs md:text-sm font-mono flex items-center gap-2 md:gap-3 transition-all ${activeFile === filename ? "bg-indigo-500/10 text-indigo-300 shadow-inner ring-1 ring-indigo-500/20" : "text-neutral-400 hover:bg-white/5 hover:text-neutral-200"}`}>
                                                {getFileIcon(filename)} <span className="truncate">{filename}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div className="flex-1 flex flex-col min-w-0 bg-[#050505]">
                                    <div className="p-2 md:p-3 border-b border-white/5 bg-[#0a0a0a] flex items-center justify-between">
                                        <div className="flex items-center gap-2 md:gap-3 px-2 md:px-3">
                                            {getFileIcon(activeFile)} <span className="text-xs md:text-sm font-mono text-neutral-300 font-semibold">{activeFile}</span>
                                        </div>
                                        <button onClick={() => copyToClipboard(generatedFiles[activeFile], 'code')} className="p-1.5 md:p-2 text-neutral-500 hover:text-white rounded-lg hover:bg-white/10 transition-colors flex items-center gap-2" title="Salin Kode">
                                        {copiedCode ? <Check className="w-4 h-4 text-green-400" /> : <Copy className="w-4 h-4" />}
                                        </button>
                                    </div>
                                    <div className="flex-1 overflow-auto p-4 custom-scrollbar relative">
                                        <pre className="font-mono text-[11px] sm:text-[13px] leading-relaxed break-words">
                                            {generatedFiles[activeFile].split('\n').map((line, i) => {
                                                let lineClass = "text-neutral-300";
                                                if (activeFile.endsWith('.html')) {
                                                    if (line.match(/<\/?script|<\/?style|<\/?link|<\/?meta/)) lineClass = "text-amber-400";
                                                    else if (line.match(/<\/?\w+/)) lineClass = "text-indigo-400";
                                                    else if (line.match(/class=/)) lineClass = "text-green-300";
                                                } else if (activeFile.endsWith('.css')) {
                                                    if (line.includes('{') || line.includes('}')) lineClass = "text-amber-300";
                                                    else if (line.includes(':')) lineClass = "text-teal-300";
                                                } else if (activeFile.endsWith('.js')) {
                                                    if (line.match(/function|const|let|=>|class|return/)) lineClass = "text-purple-400";
                                                    else if (line.includes('//')) lineClass = "text-neutral-500 italic";
                                                    else if (line.match(/['"`].*?['"`]/)) lineClass = "text-green-300";
                                                } else if (activeFile.endsWith('.md')) {
                                                    if (line.startsWith('#')) lineClass = "text-blue-400 font-bold";
                                                }
                                                return (
                                                    <div key={i} className={`flex ${lineClass}`}>
                                                        <span className="w-6 sm:w-10 shrink-0 text-right pr-2 sm:pr-4 text-neutral-700 select-none border-r border-white/5 mr-2 sm:mr-4 font-mono text-[10px] sm:text-xs">{i + 1}</span>
                                                        <span className="flex-1 whitespace-pre-wrap">{line || ' '}</span>
                                                    </div>
                                                );
                                            })}
                                        </pre>
                                    </div>
                                </div>
                            </div>
                            )
                        )}
                        </div>

                        <div className="p-3 sm:p-4 bg-[#080808] border-t border-white/5 z-20 shrink-0">
                        <div className="relative flex items-center">
                            <input
                            type="text"
                            value={refinePrompt}
                            onChange={(e) => setRefinePrompt(e.target.value)}
                            onKeyDown={(e) => e.key === 'Enter' && handleRefineCode()}
                            placeholder={generatedFiles ? "Ketik revisi (contoh: 'Ubah navbar jadi sticky')..." : "Render untuk membuka fitur AI Edit..."}
                            className="w-full bg-[#050505] border border-white/10 rounded-xl sm:rounded-2xl pl-4 sm:pl-6 pr-12 sm:pr-16 py-3 sm:py-4 text-xs sm:text-sm text-neutral-200 focus:outline-none focus:border-indigo-500 transition-all shadow-inner placeholder:text-neutral-600"
                            disabled={isRefining || isExecuting || !generatedFiles}
                            />
                            <button
                            onClick={handleRefineCode}
                            disabled={!refinePrompt.trim() || isRefining || isExecuting || !generatedFiles}
                            className="absolute right-2 sm:right-3 p-2 sm:p-2.5 bg-white hover:bg-neutral-200 disabled:bg-neutral-800 disabled:text-neutral-500 text-black rounded-lg sm:rounded-xl transition-all shadow-[0_0_15px_rgba(255,255,255,0.2)] active:scale-95"
                            title="Kirim Revisi"
                            >
                            <Send className="w-3.5 h-3.5 sm:w-4 sm:h-4" />
                            </button>
                        </div>
                        </div>

                    </div>
                    </div>

                </main>
                </div>
            );
        }

        // --- MERENDER APLIKASI ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
